<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>L Square Labs — Live Sim</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #111; color: #ddd;
                   font-family: ui-monospace, Menlo, Consolas, monospace; }
      #app { position: fixed; inset: 0; }
      #hud { position: fixed; top: 8px; left: 8px; padding: 6px 10px;
             background: rgba(0,0,0,0.5); border-radius: 4px; font-size: 12px;
             white-space: pre; pointer-events: none; }
      #controls { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
                  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
                  padding: 8px 10px; background: rgba(0,0,0,0.55);
                  border-radius: 6px; }
      #controls button {
        background: #2a2a30; color: #ddd; border: 1px solid #444;
        border-radius: 4px; padding: 6px 12px; font: inherit; cursor: pointer;
        min-width: 56px;
      }
      #controls button:hover { background: #3a3a44; }
      #controls button:active { background: #4a4a54; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">booting…</div>
    <div id="controls"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
