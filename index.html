<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>L Square Labs — Live Sim</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #111; color: #ddd;
                   font-family: ui-monospace, Menlo, Consolas, monospace;
                   overscroll-behavior: none; }
      #app { position: fixed; inset: 0; }
      #hud { position: fixed; top: 8px; left: 8px; padding: 6px 10px;
             background: rgba(0,0,0,0.5); border-radius: 4px; font-size: 12px;
             white-space: pre; pointer-events: none; }

      /* Bottom-center desktop button bar. */
      #controls { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
                  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
                  padding: 8px 10px; background: rgba(0,0,0,0.55);
                  border-radius: 6px; }
      #controls button {
        background: #2a2a30; color: #ddd; border: 1px solid #444;
        border-radius: 4px; padding: 6px 12px; font: inherit; cursor: pointer;
        min-width: 56px;
      }
      #controls button:hover { background: #3a3a44; }
      #controls button:active { background: #4a4a54; }

      /* Mobile virtual joysticks (also work with mouse-drag). */
      .vjoy { position: fixed; bottom: 24px; border-radius: 50%;
              background: rgba(20, 20, 28, 0.55);
              border: 2px solid rgba(255, 255, 255, 0.18);
              touch-action: none; user-select: none; -webkit-user-select: none;
              z-index: 5; }
      .vjoy.left  { left: 24px; }
      .vjoy.right { right: 24px; }
      .vjoy-thumb { position: absolute; width: 42%; height: 42%;
                    top: 50%; left: 50%;
                    transform: translate(-50%, -50%);
                    border-radius: 50%;
                    background: radial-gradient(circle at 35% 30%,
                      rgba(255, 230, 130, 0.9), rgba(220, 180, 0, 0.85));
                    border: 1px solid rgba(255, 255, 255, 0.4);
                    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
                    pointer-events: none;
                    transition: transform 0.04s linear; }

      /* Mobile-only icon bar, top-right corner. */
      #topbar { position: fixed; top: 8px; right: 8px;
                display: none; gap: 4px; z-index: 10; }
      #topbar button { width: 38px; height: 38px;
                       font-size: 18px; line-height: 1;
                       background: rgba(20, 20, 28, 0.6); color: #ddd;
                       border: 1px solid rgba(255, 255, 255, 0.18);
                       border-radius: 6px; cursor: pointer; }
      #topbar button:active { background: #3a3a44; }

      /* Phone / narrow tablet layout. */
      @media (max-width: 768px) {
        #controls { display: none; }
        #topbar   { display: flex; }
        #hud      { font-size: 10px; padding: 4px 6px; max-width: 60vw; }
      }
      /* Desktop: hide the on-screen joysticks (keyboard + buttons cover it). */
      @media (min-width: 769px) {
        .vjoy { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">booting…</div>
    <div id="controls"></div>
    <div id="topbar"></div>
    <div id="splat-tune" style="position:fixed; top:8px; right:8px; padding:10px 12px;
                                background:rgba(0,0,0,0.6); border-radius:6px;
                                font-family:ui-monospace,monospace; font-size:12px;
                                color:#ddd; display:flex; flex-direction:column; gap:8px;
                                min-width:260px;">
      <div style="opacity:.85; font-weight:bold;">splat transform</div>
      <!-- Each row: label · range · number. Wired up in main.ts via [data-splat]. -->
      <div data-splat-row="x" style="display:flex; align-items:center; gap:6px;">
        <span style="width:14px; opacity:.7;">x</span>
        <input data-splat="x" data-kind="range" type="range" min="-20" max="20" step="0.05" value="0" style="flex:1;" />
        <input data-splat="x" data-kind="num"   type="number" step="0.05" value="0"
               style="width:64px; padding:2px 4px; background:#1a1a1f; color:#ddd;
                      border:1px solid #444; border-radius:3px; font:inherit; text-align:right;" />
      </div>
      <div data-splat-row="y" style="display:flex; align-items:center; gap:6px;">
        <span style="width:14px; opacity:.7;">y</span>
        <input data-splat="y" data-kind="range" type="range" min="-20" max="20" step="0.05" value="0" style="flex:1;" />
        <input data-splat="y" data-kind="num"   type="number" step="0.05" value="0"
               style="width:64px; padding:2px 4px; background:#1a1a1f; color:#ddd;
                      border:1px solid #444; border-radius:3px; font:inherit; text-align:right;" />
      </div>
      <div data-splat-row="z" style="display:flex; align-items:center; gap:6px;">
        <span style="width:14px; opacity:.7;">z</span>
        <input data-splat="z" data-kind="range" type="range" min="-10" max="10" step="0.01" value="0" style="flex:1;" />
        <input data-splat="z" data-kind="num"   type="number" step="0.01" value="0"
               style="width:64px; padding:2px 4px; background:#1a1a1f; color:#ddd;
                      border:1px solid #444; border-radius:3px; font:inherit; text-align:right;" />
      </div>
      <div data-splat-row="scale" style="display:flex; align-items:center; gap:6px;">
        <span style="width:14px; opacity:.7;">s</span>
        <input data-splat="scale" data-kind="range" type="range" min="0.05" max="5" step="0.01" value="1" style="flex:1;" />
        <input data-splat="scale" data-kind="num"   type="number" step="0.01" value="1" min="0.01"
               style="width:64px; padding:2px 4px; background:#1a1a1f; color:#ddd;
                      border:1px solid #444; border-radius:3px; font:inherit; text-align:right;" />
      </div>
    </div>
    <div id="joy-left" class="vjoy left"></div>
    <div id="joy-right" class="vjoy right"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
